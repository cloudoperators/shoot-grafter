# Configuration file for <https://github.com/sapcc/go-makefile-maker>

metadata:
  url: https://github.com/cloudoperators/shoot-grafter

binaries:
  - name:        shoot-grafter
    fromPackage: .
    installTo:   bin/

golang:
  setGoModVersion: false
  enableVendoring: false

golangciLint:
  createConfig: false

# Kubebuilder targets (controller-gen, setup-envtest, generate) are in hack/kubebuilder.mk
controllerGen:
  enabled: false

githubWorkflow:
  ci:
    enabled: true
    runOn:
      - "ubuntu-latest"
  global:
    defaultBranch: main
  pushContainerToGhcr:
    enabled: true
    platforms: "linux/amd64,linux/arm64"
    tagStrategy:
      - latest
      - semver
      - sha

renovate:
  enabled: true
  assignees:
    - "@cloudoperators/greenhouse-backend"

reuse:
  enabled: true
  annotations:
  - paths:
      - '*/zz_generated.deepcopy.go'
      - 'crd/*'

license:
  addHeaders: true
  checkDependencies: true
  copyright: 'SAP SE or an SAP affiliate company and Greenhouse contributors'
  spdx: Apache-2.0

typos:
  enabled: true
  extendWords:
    Ded: Ded # Don't correct ANDed from k8s machinery

verbatim: |
  VERSION = 0.3.0

  # Wire envtest into the generated build/cover.out target so 'make build/cover.out'
  # works standalone (as called by the CI workflow) without needing KUBEBUILDER_ASSETS set.
  GO_TESTENV += KUBEBUILDER_ASSETS=$(shell $(ENVTEST) use $(ENVTEST_K8S_VERSION) --bin-dir $(LOCALBIN) -p path)
  build/cover.out: setup-envtest

  include hack/kubebuilder.mk

name: Release

on:
  release:
    types:
      - created

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    name: Build and push container image
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  notify-extensions:
    name: Notify greenhouse-extensions
    runs-on: ubuntu-latest
    needs: build-and-push-image
    permissions:
      contents: read
    steps:
      - name: Repository dispatch to greenhouse-extensions
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.EXTENSIONS_DISPATCH_TOKEN }}
          repository: abhijith-darshan/greenhouse-extensions
          event-type: plugin_release
          client-payload: |
            {
              "plugin_definition": "shoot-grafter",
              "version": "${{ github.event.release.tag_name }}"
            }
